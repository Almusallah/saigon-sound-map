# Keeps the Render free instance warm so visitors never hit the ~40 s
# cold start. Render sleeps a free service after 15 idle minutes; a ping
# every 10 minutes prevents that. One always-on service uses ~744 of the
# 750 free instance-hours per month.
#
# Note: GitHub pauses scheduled workflows after 60 days without repo
# activity — any commit resets the clock. Failures also act as a crude
# downtime alert (GitHub emails the repo owner when a run fails).
name: keepalive
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS -m 90 --retry 2 https://saigon-soundscape.onrender.com/api/health

